name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          sudo xcode-select -s "/Applications/$XCODE_APP"
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen
          pip3 install --break-system-packages PyJWT requests

      - name: Set build number
        run: |
          BUILD_NUM=$(( ${{ github.run_number }} + 55 ))
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
          sed -i "" "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
          echo "Build number: $BUILD_NUM"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

      - name: Import Distribution Certificate
        env:
          CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERT_BASE64" | base64 -D > cert.p12
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Prepare provisioning profile
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        run: python3 scripts/prepare_profile.py

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project LifeRoulette.xcodeproj \
            -scheme LifeRoulette \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/LifeRoulette.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="SonoSuujiNoHanashi App Store" \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LifeRoulette.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Upload IPA to App Store Connect
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        run: |
          IPA_PATH=$(find build/export -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Submit for Review
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          APP_ID: "6768641431"
          APP_VERSION: "1.0"
          BUILD_NUMBER: ${{ env.BUILD_NUM }}
        run: python3 scripts/submit_metadata.py
