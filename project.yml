name: LifeRoulette
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.sonosuujinohanashi
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
    GAD_BANNER_AD_UNIT_ID: "ca-app-pub-3940256099942544/2435281174"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

targets:
  LifeRoulette:
    type: application
    platform: iOS
    sources: [LifeRoulette]
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_NAME: LifeRoulette
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: LifeRoulette/Info.plist
      properties:
        CFBundleName: "その数字のお話"
        CFBundleDisplayName: "その数字のお話"
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        LSApplicationCategoryType: public.app-category.entertainment
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        GADBannerAdUnitID: "$(GAD_BANNER_AD_UNIT_ID)"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
        NSUserTrackingUsageDescription: "広告の表示と効果測定のために使用します。許可しなくてもアプリはそのまま使えます。"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Light
